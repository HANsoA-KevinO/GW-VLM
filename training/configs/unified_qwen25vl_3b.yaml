# 统一(E5)原型/调试 —— Qwen2.5-VL-3B(已缓存,快、稳、不卡 SSH)
# 用于隔离 nan:模型无关的 head/pipeline bug 会在这里复现;若这里稳=nan 是 27B-4bit 特有。
model_id: Qwen/Qwen2.5-VL-3B-Instruct
model_family: qwen
load_in_4bit: false
gradient_checkpointing: false   # 3B 显存充裕
dtype: bfloat16
device_map: {"": 0}

data_dir: output/training_data/e5
image_root: output/spectrograms_viridis
strain_root: output/strain_arrays
output_dir: output/runs/unified_q25_3b

use_image: true
use_strain: true

strain_encoder_type: patch_attn
strain_sr: 2048
strain_in_len: 8192
strain_patch_size: 256
strain_attn_layers: 3
strain_attn_heads: 8
strain_mlp_proj: true
strain_n_tokens: 32
strain_channels: [32, 64, 128, 256]

param_loss_weight: 1.0
head_mlp_hidden: 256
head_dropout: 0.1
head_lr: 1.0e-3

lora_r: 32
lora_alpha: 32
lora_dropout: 0.0

max_seq_length: 2048
batch_size: 4
num_workers: 2
grad_accum: 2
epochs: 2
learning_rate: 2.0e-4
strain_encoder_lr: 1.0e-3
warmup_ratio: 0.03
weight_decay: 0.01
seed: 42
enable_thinking: false
max_pixels: 262144
