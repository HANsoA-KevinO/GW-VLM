# Qwen3.6-27B Dense — E1（纯检测）主对比（bf16 LoRA，DGX Spark 128GB）
model_id: unsloth/Qwen3.6-27B            # 原版：Qwen/Qwen3.6-27B
chat_template: null                       # Qwen 系列 Unsloth 自动处理模板
load_in_4bit: false
bf16: true
device_map: {"": 0}     # GB10 统一内存：强制全放 cuda:0，避免 auto/sequential 误 offload 到 CPU

data_dir: output/training_data/e1
image_root: output/spectrograms
output_dir: output/runs/e1_qwen36_27b

# 获胜配方(与 31B v2 一致；2026-06-17 验证有效)
lora_r: 32
lora_alpha: 32
lora_dropout: 0.0
finetune_vision_layers: true
finetune_language_layers: true

max_seq_length: 2048
batch_size: 2
grad_accum: 4           # 有效 batch 8
epochs: 3
learning_rate: 2.0e-4
seed: 42
report_to: none
# 注：image_tokens 对 Gemma4 生效；Qwen 处理器无 max_soft_tokens，会跳过设置但仍 resize=max
#     (用 Qwen 原生分辨率，比 Unsloth 512 兜底好)。Qwen 路未实测，首跑留意 OOM/坑。
image_tokens: 560
